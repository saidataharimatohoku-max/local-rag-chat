<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAG Chat</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <h1>RAG Chat</h1>
        <p class="subtitle">Ask questions grounded in your documents.</p>
        <div class="upload-bar">
          <label for="file-input" id="upload-button" class="upload-button">
            + Add document
          </label>
          <input
            id="file-input"
            type="file"
            accept=".md,.txt,.pdf,.docx"
            class="visually-hidden"
          />
          <span id="upload-status" class="upload-status"></span>
        </div>
        <div id="dropzone" class="dropzone">
          <span class="dropzone-hint">Drag &amp; drop a document here to index it</span>
        </div>
        <div id="doc-list" class="doc-list" aria-live="polite"></div>
        <div class="controls">
          <label class="agent-toggle">
            <input type="checkbox" id="agent-toggle" />
            <span>Agent mode</span>
            <span class="agent-hint">routes, self-checks retrieval, and can ask clarifying questions</span>
          </label>
          <button type="button" id="new-chat" class="new-chat-button">🔄 New chat</button>
        </div>
      </header>

      <section id="messages" class="messages" aria-live="polite"></section>

      <form id="chat-form" class="chat-form">
        <input
          id="question"
          type="text"
          placeholder="Ask a question…"
          autocomplete="off"
          required
        />
        <button type="submit">Send</button>
      </form>
    </main>
    <script src="app.js"></script>
  </body>
</html>
